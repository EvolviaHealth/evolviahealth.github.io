<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img" aria-label="EvolvIA Health">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3FC8D8"/>
      <stop offset="50%" stop-color="#4FCAB0"/>
      <stop offset="100%" stop-color="#8FCB60"/>
    </linearGradient>
    <linearGradient id="rightBrainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DC76D"/>
      <stop offset="100%" stop-color="#9ED57A"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3FC8D8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8FCB60" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="sparkleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#A8EBD4"/>
      <stop offset="100%" stop-color="#3FC8D8"/>
    </radialGradient>
  </defs>

  <!-- Symbol container — 80x80 area on the left -->
  <g transform="translate(10, 18)">

    <!-- Orbital ring — elliptical curve going around brain -->
    <ellipse cx="32" cy="34" rx="38" ry="20"
             fill="none" stroke="url(#orbitGrad)" stroke-width="2"
             stroke-linecap="round" opacity="0.85"
             transform="rotate(-18 32 34)"/>

    <!-- Brain — LEFT lobe (teal-blue gradient) -->
    <path d="M 30 16
             C 26 14, 22 14, 19 16
             C 14 18, 11 22, 11 28
             C 9 30, 8 33, 9 36
             C 7 38, 8 42, 11 44
             C 11 48, 14 51, 18 52
             C 21 54, 27 54, 30 52
             L 30 16 Z"
          fill="url(#brainGrad)"/>

    <!-- Brain — RIGHT lobe (green) -->
    <path d="M 32 16
             C 36 14, 40 14, 43 16
             C 48 18, 51 22, 51 28
             C 53 30, 54 33, 53 36
             C 55 38, 54 42, 51 44
             C 51 48, 48 51, 44 52
             C 41 54, 35 54, 32 52
             L 32 16 Z"
          fill="url(#rightBrainGrad)"/>

    <!-- Brain folds — LEFT (suggesting cortex texture) -->
    <g stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.42" stroke-linecap="round">
      <path d="M 14 24 Q 18 26 22 25"/>
      <path d="M 13 32 Q 18 34 22 33"/>
      <path d="M 14 40 Q 18 42 22 41"/>
    </g>

    <!-- Brain folds — RIGHT -->
    <g stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.48" stroke-linecap="round">
      <path d="M 40 24 Q 44 26 48 25"/>
      <path d="M 40 32 Q 44 34 48 33"/>
      <path d="M 40 40 Q 44 42 48 41"/>
    </g>

    <!-- Center divider -->
    <line x1="31" y1="15" x2="31" y2="53" stroke="#0B1A2E" stroke-width="1.4" opacity="0.55"/>

    <!-- Sparkle (4-pointed star — upper right of brain) -->
    <g transform="translate(54, 12)">
      <path d="M 0 -9 L 1.6 -1.6 L 9 0 L 1.6 1.6 L 0 9 L -1.6 1.6 L -9 0 L -1.6 -1.6 Z"
            fill="url(#sparkleGrad)"/>
      <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.9"/>
    </g>

  </g>

  <!-- Wordmark "EvolvIA" -->
  <g transform="translate(96, 14)">
    <text x="0" y="48"
          font-family="'Fraunces', 'Times New Roman', serif"
          font-weight="700"
          font-size="46"
          letter-spacing="-0.025em"
          fill="#F4F0E8">Evolv<tspan fill="#8FCB60">IA</tspan></text>
  </g>

  <!-- "— HEALTH —" subtitle -->
  <g transform="translate(112, 78)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#F4F0E8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <text x="32" y="4"
          font-family="'Geist', 'Helvetica Neue', sans-serif"
          font-weight="500"
          font-size="13"
          letter-spacing="0.4em"
          fill="#F4F0E8">HEALTH</text>
    <line x1="142" y1="0" x2="164" y2="0" stroke="#F4F0E8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
